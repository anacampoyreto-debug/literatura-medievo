<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Literatura Medieval · 3º ESO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h1>📜 Literatura Medieval</h1>
  <p>Entrenamiento interactivo · 3º ESO</p>
</header>

<nav class="menu" id="menuBloques">
  <button type="button" data-bloque="0">🔵 Poesía Popular</button>
  <button type="button" data-bloque="1">🔴 Poesía Culta</button>
  <button type="button" data-bloque="2">🟡 Prosa y Teatro</button>
  <button type="button" data-bloque="3">🟢 Laboratorio Técnico</button>
</nav>

<section class="modo">
  <button type="button" id="btnPractica">Modo Práctica</button>
  <button type="button" id="btnExamen">Modo Examen</button>
</section>

<main class="container">
  <div id="info"></div>

  <section class="panel-superior">
    <div class="estado">
      <span class="estado-label">Bloque</span>
      <strong id="nombreBloque">—</strong>
    </div>

    <div class="estado">
      <span class="estado-label">Pregunta</span>
      <strong id="contadorPregunta">0 / 0</strong>
    </div>

    <div class="estado">
      <span class="estado-label">Modo</span>
      <strong id="modoActualTexto">Práctica</strong>
    </div>

    <div class="estado">
      <span class="estado-label">Aciertos</span>
      <strong id="contadorAciertos">0</strong>
    </div>
  </section>

  <section class="progreso-wrap" aria-label="Progreso del bloque">
    <div class="progreso-barra">
      <div id="progreso" class="progreso-fill"></div>
    </div>
  </section>

  <section class="subnav">
    <button type="button" id="btnVistaQuiz" class="activo">Quiz</button>
    <button type="button" id="btnVistaEsquema">Esquema</button>
    <button type="button" id="btnVistaCortas">Preguntas cortas</button>
  </section>

  <section id="panelEsquema" class="panel-extra oculto"></section>
  <section id="panelCortas" class="panel-extra oculto"></section>

  <section id="panelQuiz">
    <div id="quiz-container">
      <h2 id="pregunta"></h2>
      <div id="opciones"></div>
    </div>

    <div class="controles">
      <button type="button" id="btnComprobar">Comprobar</button>
      <button type="button" id="btnSiguiente">Siguiente</button>
      <button type="button" id="btnReiniciar">Reiniciar bloque</button>
    </div>

    <div id="resultado" aria-live="polite"></div>
  </section>
</main>

<footer>
  <p>Proyecto educativo · Ana Campoy</p>
</footer>

<script src="data.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  let bloqueActual = 0;
  let preguntaActual = 0;
  let modo = "practica";
  let vistaActual = "quiz";

  let preguntasActivas = [];
  let seleccion = null;
  let respondida = false;
  let aciertos = 0;
  let respuestasExamen = [];

  const els = {
    menuBloques: document.getElementById("menuBloques"),
    btnPractica: document.getElementById("btnPractica"),
    btnExamen: document.getElementById("btnExamen"),
    btnVistaQuiz: document.getElementById("btnVistaQuiz"),
    btnVistaEsquema: document.getElementById("btnVistaEsquema"),
    btnVistaCortas: document.getElementById("btnVistaCortas"),
    btnComprobar: document.getElementById("btnComprobar"),
    btnSiguiente: document.getElementById("btnSiguiente"),
    btnReiniciar: document.getElementById("btnReiniciar"),
    nombreBloque: document.getElementById("nombreBloque"),
    contadorPregunta: document.getElementById("contadorPregunta"),
    modoActualTexto: document.getElementById("modoActualTexto"),
    contadorAciertos: document.getElementById("contadorAciertos"),
    progreso: document.getElementById("progreso"),
    info: document.getElementById("info"),
    panelQuiz: document.getElementById("panelQuiz"),
    panelEsquema: document.getElementById("panelEsquema"),
    panelCortas: document.getElementById("panelCortas"),
    quizContainer: document.getElementById("quiz-container"),
    resultado: document.getElementById("resultado")
  };

  function hayDatosValidos() {
    return Array.isArray(window.datos) && window.datos.length > 0;
  }

  function mostrarError(texto) {
    els.panelQuiz.innerHTML = `
      <div class="resultado-final">
        <h2>Error</h2>
        <p>${texto}</p>
      </div>
    `;
  }

  function mezclarArray(array) {
    const copia = [...array];
    for (let i = copia.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copia[i], copia[j]] = [copia[j], copia[i]];
    }
    return copia;
  }

  function obtenerBloqueActual() {
    return hayDatosValidos() ? window.datos[bloqueActual] : null;
  }

  function prepararPreguntasActivas() {
    const bloque = obtenerBloqueActual();
    const base = Array.isArray(bloque?.preguntas) ? bloque.preguntas : [];
    preguntasActivas = modo === "examen" ? mezclarArray(base) : [...base];
    respuestasExamen = new Array(preguntasActivas.length).fill(null);
  }

  function actualizarBotonesBloque() {
    els.menuBloques.querySelectorAll("button").forEach((btn, i) => {
      btn.classList.toggle("activo", i === bloqueActual);
    });
  }

  function actualizarBotonesModo() {
    els.btnPractica.classList.toggle("activo", modo === "practica");
    els.btnExamen.classList.toggle("activo", modo === "examen");
    els.modoActualTexto.textContent = modo === "practica" ? "Práctica" : "Examen";
    els.contadorAciertos.textContent = modo === "practica" ? aciertos : "—";
  }

  function actualizarBotonesVista() {
    els.btnVistaQuiz.classList.toggle("activo", vistaActual === "quiz");
    els.btnVistaEsquema.classList.toggle("activo", vistaActual === "esquema");
    els.btnVistaCortas.classList.toggle("activo", vistaActual === "cortas");
  }

  function actualizarPanel() {
    const bloque = obtenerBloqueActual();
    const total = preguntasActivas.length;

    let visible = total === 0 ? 0 : Math.min(preguntaActual + 1, total);
    if (preguntaActual >= total && total > 0) visible = total;

    let progreso = 0;
    if (total > 0) {
      if (modo === "examen") {
        const contestadas = respuestasExamen.filter(x => x !== null).length;
        progreso = (contestadas / total) * 100;
      } else {
        progreso = respondida ? ((preguntaActual + 1) / total) * 100 : (preguntaActual / total) * 100;
      }
    }

    els.nombreBloque.textContent = bloque?.nombre || bloque?.titulo || `Bloque ${bloqueActual + 1}`;
    els.contadorPregunta.textContent = `${visible} / ${total}`;
    els.contadorAciertos.textContent = modo === "practica" ? aciertos : "—";
    els.progreso.style.width = `${Math.max(0, Math.min(100, progreso))}%`;
  }

  function mostrarMensajeResultado(texto = "") {
    els.resultado.textContent = texto;
  }

  function renderInfoBloque() {
    const bloque = obtenerBloqueActual();
    if (!bloque) {
      els.info.innerHTML = "";
      return;
    }

    els.info.innerHTML = `
      <div class="bloque-resumen">
        <h3>${bloque.nombre || bloque.titulo}</h3>
        <p>Trabaja el bloque con esquema, test y preguntas cortas guiadas.</p>
      </div>
    `;
  }

  function renderEsquema() {
    const bloque = obtenerBloqueActual();
    if (!bloque) {
      els.panelEsquema.innerHTML = "";
      return;
    }

    let figurasHTML = "";

    if (bloque.figuras_esquema) {
      const fe = bloque.figuras_esquema;

      const pintarGrupo = (titulo, arr) => {
        if (!Array.isArray(arr) || !arr.length) return "";
        return `
          <div class="grupo-figuras">
            <h4>${titulo}</h4>
            <div class="tabla-figuras">
              ${arr.map(item => `
                <div class="figura-item">
                  <strong>${item.figura}</strong>
                  <p><em>Definición:</em> ${item.definicion}</p>
                  <p><em>Ejemplo:</em> ${item.ejemplo}</p>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      };

      figurasHTML = `
        ${pintarGrupo("Figuras de sonido", fe.sonido)}
        ${pintarGrupo("Figuras de estructura", fe.estructura)}
        ${pintarGrupo("Figuras de significado", fe.significado)}
        ${
          Array.isArray(fe.memoria) && fe.memoria.length
            ? `<div class="grupo-figuras"><h4>Esquema rápido</h4><ul>${fe.memoria.map(x => `<li>${x}</li>`).join("")}</ul></div>`
            : ""
        }
        ${
          Array.isArray(fe.trucos) && fe.trucos.length
            ? `<div class="grupo-figuras"><h4>Trucos</h4><ul>${fe.trucos.map(x => `<li>${x}</li>`).join("")}</ul></div>`
            : ""
        }
      `;
    }

    els.panelEsquema.innerHTML = `
      <div class="resultado-final">
        <h2>Esquema del bloque</h2>
        <ul class="lista-esquema">
          ${(bloque.esquema || []).map(item => `<li>${item}</li>`).join("")}
        </ul>
        ${figurasHTML}
      </div>
    `;
  }

  function plantillaRespuesta(textoPregunta = "") {
    const t = textoPregunta.toLowerCase();

    if (t.includes("qué es") || t.includes("que es")) return "Empieza con: “X es…”";
    if (t.includes("qué significa") || t.includes("que significa")) return "Empieza con: “Significa que…”";
    if (t.includes("quién") || t.includes("quien")) return "Empieza con: “Fue…” o “Es…”";
    if (t.includes("cuál es") || t.includes("cual es")) return "Empieza con: “Es…”";
    return "Escribe 1 línea clara y completa.";
  }

  function renderCortas() {
    const bloque = obtenerBloqueActual();
    if (!bloque) {
      els.panelCortas.innerHTML = "";
      return;
    }

    const cortas = Array.isArray(bloque.cortas) ? bloque.cortas : [];

    els.panelCortas.innerHTML = `
      <div class="resultado-final">
        <h2>Preguntas cortas con escritura guiada</h2>
        ${
          cortas.length
            ? cortas.map((item, i) => `
              <div class="corta-card">
                <div class="corta-head">
                  <h4>${item.n}. ${item.pregunta}</h4>
                </div>

                <label class="corta-label" for="respuestaCorta_${i}">
                  Escribe 1 línea
                </label>

                <textarea
                  id="respuestaCorta_${i}"
                  class="corta-textarea"
                  rows="3"
                  placeholder="${plantillaRespuesta(item.pregunta)}"
                ></textarea>

                <div class="corta-botones">
                  <button type="button" class="btn-corta btn-corta-comprobar" data-i="${i}">
                    Comprobar
                  </button>
                  <button type="button" class="btn-corta btn-corta-modelo" data-i="${i}">
                    Ver modelo
                  </button>
                </div>

                <p class="corta-pista">${plantillaRespuesta(item.pregunta)}</p>

                <div class="corta-resultado" id="cortaResultado_${i}"></div>
                <div class="corta-modelo oculto" id="cortaModelo_${i}">
                  <p><strong>Modelo:</strong> ${item.respuesta || ""}</p>
                </div>
              </div>
            `).join("")
            : "<p>No hay preguntas cortas disponibles en este bloque.</p>"
        }
      </div>
    `;

    els.panelCortas.querySelectorAll(".btn-corta-comprobar").forEach(btn => {
      btn.addEventListener("click", () => {
        const i = btn.dataset.i;
        const textarea = document.getElementById(`respuestaCorta_${i}`);
        const resultado = document.getElementById(`cortaResultado_${i}`);
        const valor = textarea.value.trim();

        if (!valor) {
          resultado.innerHTML = `<p>Escribe una respuesta antes de comprobar.</p>`;
          return;
        }

        resultado.innerHTML = `<p>✔ Respuesta escrita. Ahora compárala con el modelo.</p>`;
      });
    });

    els.panelCortas.querySelectorAll(".btn-corta-modelo").forEach(btn => {
      btn.addEventListener("click", () => {
        const i = btn.dataset.i;
        document.getElementById(`cortaModelo_${i}`).classList.toggle("oculto");
      });
    });
  }

  function mostrarVista(vista) {
    vistaActual = vista;
    actualizarBotonesVista();

    els.panelQuiz.classList.toggle("oculto", vista !== "quiz");
    els.panelEsquema.classList.toggle("oculto", vista !== "esquema");
    els.panelCortas.classList.toggle("oculto", vista !== "cortas");

    if (vista === "esquema") renderEsquema();
    if (vista === "cortas") renderCortas();
  }

  function restaurarEstructuraQuiz() {
    els.quizContainer.innerHTML = `
      <h2 id="pregunta"></h2>
      <div id="opciones"></div>
    `;
  }

  function limpiarSeleccionVisual() {
    document.querySelectorAll(".opcion").forEach(b => b.classList.remove("seleccionada"));
  }

  function seleccionarOpcion(i, btn) {
    if (respondida) return;
    limpiarSeleccionVisual();
    btn.classList.add("seleccionada");
    seleccion = i;
    mostrarMensajeResultado("");
  }

  function renderPregunta() {
    if (!preguntasActivas.length) {
      els.quizContainer.innerHTML = `
        <div class="resultado-final">
          <h2>No hay preguntas disponibles</h2>
          <p>Revisa el archivo <strong>data.js</strong>.</p>
        </div>
      `;
      els.btnComprobar.disabled = true;
      els.btnSiguiente.disabled = true;
      actualizarPanel();
      return;
    }

    if (preguntaActual < 0) preguntaActual = 0;
    if (preguntaActual >= preguntasActivas.length) {
      mostrarResultadoFinal();
      return;
    }

    respondida = false;
    seleccion = modo === "examen" ? respuestasExamen[preguntaActual] : null;

    restaurarEstructuraQuiz();

    const pregunta = preguntasActivas[preguntaActual];
    const preguntaEl = document.getElementById("pregunta");
    const opcionesDiv = document.getElementById("opciones");

    preguntaEl.textContent = `${preguntaActual + 1}. ${pregunta.enunciado || pregunta.pregunta || ""}`;
    opcionesDiv.innerHTML = "";

    (pregunta.opciones || []).forEach((opcionTexto, i) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "opcion";
      btn.textContent = opcionTexto;

      if (seleccion === i) btn.classList.add("seleccionada");

      btn.addEventListener("click", () => {
        if (respondida) return;
        seleccionarOpcion(i, btn);
      });

      opcionesDiv.appendChild(btn);
    });

    els.btnComprobar.disabled = false;
    els.btnSiguiente.disabled = false;
    mostrarMensajeResultado("");
    actualizarPanel();
  }

  function comprobarRespuesta() {
    if (respondida) return;

    if (seleccion === null) {
      mostrarMensajeResultado("Selecciona una opción antes de comprobar.");
      return;
    }

    const pregunta = preguntasActivas[preguntaActual];
    const botones = document.querySelectorAll(".opcion");
    if (!pregunta || !botones.length) return;

    respondida = true;

    if (modo === "examen") {
      respuestasExamen[preguntaActual] = seleccion;
      botones.forEach(btn => btn.disabled = true);
      mostrarMensajeResultado("✔ Respuesta guardada.");
      actualizarPanel();
      return;
    }

    botones.forEach((btn, i) => {
      btn.disabled = true;
      if (i === Number(pregunta.correcta)) btn.classList.add("correcta");
      if (i === seleccion && i !== Number(pregunta.correcta)) btn.classList.add("incorrecta");
    });

    if (seleccion === Number(pregunta.correcta)) {
      aciertos++;
      mostrarMensajeResultado("✔ Correcto.");
    } else {
      mostrarMensajeResultado(`✘ Incorrecto. ${pregunta.feedback || ""}`);
    }

    actualizarPanel();
  }

  function siguientePregunta() {
    if (!preguntasActivas.length) return;

    if (!respondida) {
      mostrarMensajeResultado("Primero debes comprobar la respuesta.");
      return;
    }

    preguntaActual++;

    if (preguntaActual >= preguntasActivas.length) {
      mostrarResultadoFinal();
      return;
    }

    renderPregunta();
  }

  function mostrarResultadoFinal() {
    const total = preguntasActivas.length;

    if (modo === "examen") {
      aciertos = preguntasActivas.reduce((suma, pregunta, i) => {
        return suma + (respuestasExamen[i] === Number(pregunta.correcta) ? 1 : 0);
      }, 0);
    }

    const porcentaje = total === 0 ? 0 : Math.round((aciertos / total) * 100);

    let mensaje = "";
    if (porcentaje >= 90) mensaje = "Dominio excelente del bloque.";
    else if (porcentaje >= 70) mensaje = "Muy buen trabajo.";
    else if (porcentaje >= 50) mensaje = "Base conseguida, pero aún puedes afinar.";
    else mensaje = "Necesitas otra vuelta de estudio, y eso tiene arreglo.";

    const bloque = obtenerBloqueActual();

    els.quizContainer.innerHTML = `
      <div class="resultado-final">
        <h2>Resultado final</h2>
        <p><strong>Bloque:</strong> ${bloque?.nombre || bloque?.titulo || `Bloque ${bloqueActual + 1}`}</p>
        <p><strong>Modo:</strong> ${modo === "practica" ? "Práctica" : "Examen"}</p>
        <p><strong>Aciertos:</strong> ${aciertos} / ${total}</p>
        <p><strong>Porcentaje:</strong> ${porcentaje}%</p>
        <p><strong>Valoración:</strong> ${mensaje}</p>
      </div>
    `;

    els.btnComprobar.disabled = true;
    els.btnSiguiente.disabled = true;
    els.contadorPregunta.textContent = `${total} / ${total}`;
    els.contadorAciertos.textContent = aciertos;
    els.progreso.style.width = "100%";
    mostrarMensajeResultado("Bloque completado.");
  }

  function reiniciarBloque() {
    preguntaActual = 0;
    seleccion = null;
    respondida = false;
    aciertos = 0;
    prepararPreguntasActivas();
    renderInfoBloque();
    renderEsquema();
    renderCortas();
    renderPregunta();
    mostrarVista(vistaActual);
  }

  function cargarBloque(num) {
    bloqueActual = num;
    actualizarBotonesBloque();
    reiniciarBloque();
  }

  function activarModo(nuevoModo) {
    if (modo === nuevoModo) return;
    modo = nuevoModo;
    actualizarBotonesModo();
    reiniciarBloque();
  }

  function enlazarEventos() {
    els.menuBloques.querySelectorAll("button").forEach((btn, i) => {
      btn.addEventListener("click", () => cargarBloque(i));
    });

    els.btnPractica.addEventListener("click", () => activarModo("practica"));
    els.btnExamen.addEventListener("click", () => activarModo("examen"));
    els.btnVistaQuiz.addEventListener("click", () => mostrarVista("quiz"));
    els.btnVistaEsquema.addEventListener("click", () => mostrarVista("esquema"));
    els.btnVistaCortas.addEventListener("click", () => mostrarVista("cortas"));
    els.btnComprobar.addEventListener("click", comprobarRespuesta);
    els.btnSiguiente.addEventListener("click", siguientePregunta);
    els.btnReiniciar.addEventListener("click", reiniciarBloque);

    document.addEventListener("keydown", (e) => {
      if (vistaActual !== "quiz") return;

      const opciones = [...document.querySelectorAll(".opcion:not(:disabled)")];
      if (!opciones.length) return;

      if (e.key >= "1" && e.key <= "9") {
        const idx = Number(e.key) - 1;
        if (opciones[idx]) opciones[idx].click();
      }

      if (e.key === "Enter") {
        if (!respondida) comprobarRespuesta();
        else siguientePregunta();
      }
    });
  }

  function init() {
    if (!hayDatosValidos()) {
      mostrarError('No se ha encontrado un array válido llamado <strong>datos</strong> en <strong>data.js</strong>.');
      return;
    }

    enlazarEventos();
    actualizarBotonesModo();
    actualizarBotonesBloque();
    actualizarBotonesVista();
    reiniciarBloque();
  }

  init();
});
</script>

</body>
</html>
